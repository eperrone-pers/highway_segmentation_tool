# Code review: 2026-04-29 — marker registry + config cleanup verified via full pytest run

[pytest]
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    ui: GUI and user interface tests
    excel_export: Tests for Excel export functionality
    phase1: Phase 1 multi-route processing tests
    route: Route processing functionality tests
    data_dependent: Tests that require external data files
    slow: Slow running tests (> 5 seconds)
    performance: Performance benchmarks and stress tests
    mock_only: Tests using only mock objects
    file_io: Tests involving file system operations

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --strict-markers
    -v
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
